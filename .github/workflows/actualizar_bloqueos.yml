name: actualizar_bloqueos

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-bloqueos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas requests

      - name: Regenerate bloqueos.csv
        run: python bloqueos.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- static/bloqueos.csv; then
            echo "No changes in static/bloqueos.csv"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/bloqueos.csv
          git commit -m "Actualizar bloqueos"
          git push
